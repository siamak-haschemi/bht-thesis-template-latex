name: Build PDF

# Builds the thesis PDF inside the same Docker image as local builds
# (see Dockerfile). CI uses ci-build.sh, which is the buildx-based
# counterpart of build.sh and benefits from GitHub's layer cache so we
# don't re-pull texlive (~5 GB) on every run. The resulting out/main.pdf
# is uploaded as a workflow artifact, downloadable from the run page.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker buildx
        # Configures buildx and exports ACTIONS_CACHE_URL /
        # ACTIONS_RUNTIME_TOKEN so `--cache-{from,to} type=gha` works
        # inside ci-build.sh.
        uses: docker/setup-buildx-action@v3

      - name: Build PDF
        run: ./ci-build.sh

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: main-pdf
          path: out/main.pdf
          if-no-files-found: error
